<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check In Club | checkinclub.ca</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/favicon.png">

    <meta property="og:title" content="Check In Club | Contact">
    <meta property="og:description" content="Stay connected without the noise of social media">
    <meta property="og:image" content="http://checkinclub.ca/images/meta-img.png">
    <meta property="og:url" content="http://checkinclub.ca/contact">
    <meta property="og:type" content="website">


</head>
<body>
    <header class="main-header">
        <div class="logo">
            <a href="/">
                <img src="images/full-logo.png" alt="Check In Club logo" class="logo-desktop">
                <img src="images/just-logo.png" alt="Check In Club logo" class="logo-mobile">
            </a>
        </div>
        <button class="nav-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="site-nav">
            <span class="nav-toggle_bar"></span>
            <span class="nav-toggle_bar"></span>
            <span class="nav-toggle_bar"></span>
        </button>
        <nav class="nav-links" id="mobile-nav">
            <a href="/contact">Contact</a>
            <a href="/about">About</a>
            <a href="/signup" class=" btn btn-primary">Sign Up</a>
        </nav>
    </header>

    <main>
        <section class="contact-section">
            <h1>Thanks for checking in!</h1>

            <div class="contact-form">
                <form action="https://formspree.io/f/mkokoeea" method="POST">
                    <div class="contact-row">
                        <div class="input-group">
                            <label for="name">Your Name *</label>
                            <input type="text" name="name" id="name" placeholder="Jane Doe" required>
                        </div>
                        <div class="input-group">
                            <label for="email">Email Address *</label>
                            <input type="email" name="email" id="email" placeholder="checkin@club.com" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="message">Message *</label>
                        <textarea name="message" id="message" placeholder="Ask a question, provide a suggestion, or just say hi!"></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Submit</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="footer-contents">
            <a href="/">
                <img src="images/full-ltlogo.png" alt="Check In Club logo" class="logo-desktop">
                <img src="images/lettermark-logo.png" alt="Check In Club logo" class="footer-logo logo-mobile">
            </a>
            <div class="footer-quick">
                <div class="footer-links">
                    <h3>Product</h3>
                    <a href="#what-features">Features</a>
                    <a href="#how-it-works">How It Works</a>
                    <a href="/faq">FAQ</a>
                </div>
                <div class="footer-links">
                    <h3>Company</h3>
                    <a href="/about">About Us</a>
                    <a href="/contact">Contact</a>
                </div>    
            </div>
        </div>
        <div class="footer-copy">
            <p>&copy; 2026 Check In Club. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
